# Cluster topology definition.
# This file defines both the structural topology and its UI rendering.
#
# config.components: Which components are used and their defaults.
# config.parametersSchema: Reference a Go type for custom topology parameters fields.
# ui: Rendering hints for the frontend form.
#
# See github.com/openeverest/provider-sdk/blob/main/PROVIDER_DEVELOPMENT.md
# for detailed guidance.

config:
    parametersSchema: ClusterTopologyParameters
    components:
        engine:
            type: postgresql
            replicas: 3
        proxy:
            type: pgbouncer
            replicas: 2
ui:
    sections:
        databaseVersion:
            components:
                version:
                    fieldParams:
                        label: Database Version
                        optionsPath: spec.versions
                        optionsPathConfig:
                            labelPath: name
                            valuePath: name
                        modes:
                            edit:
                                disabled: true
                            restore:
                                disabled: true
                    path: spec.version
                    uiType: select
                    validation:
                        required: true
            description: Provide the database version for your new database.
            label: Database Version
        resources:
            components:
                numberOfNodes:
                    fieldParams:
                        label: Number of nodes
                        defaultValue: 2
                    path: spec.components.engine.replicas
                    uiType: number
                    validation:
                        min: 1
                resources:
                    components:
                        cpu:
                            fieldParams:
                                label: CPU
                                defaultValue: 1
                            path: spec.components.engine.resources.requests.cpu
                            uiType: number
                            validation:
                                min: 1
                        disk:
                            fieldParams:
                                label: Disk
                                defaultValue: 25
                                badge: Gi
                                badgeToApi: true
                            path: spec.components.engine.storage.size
                            uiType: number
                            validation:
                                min: 1
                        memory:
                            fieldParams:
                                label: Memory
                                defaultValue: 2
                                badge: Gi
                                badgeToApi: true
                            path: spec.components.engine.resources.requests.memory
                            uiType: number
                            validation:
                                min: 1
                    groupType: line
                    uiType: group
            description: Configure the resources your database will have access to.
            label: Resources
        proxy:
          label: "Proxy"
          description: "Configure a single proxy type for the cluster."
          components:
            proxyType:
              uiType: select
              path: spec.components.proxy.type
              fieldParams:
                label: "Proxy type"
                defaultValue: "pgbouncer"
                options:
                  - label: "PGBouncer"
                    value: "pgbouncer"
              validation:
                required: true
            proxyNodes:
              uiType: number
              path: spec.components.proxy.replicas
              fieldParams:
                label: "Number of proxy nodes"
                defaultValue: 2
              validation:
                min: 1
                int: true
                required: true
          componentsOrder:
            - proxyType
            - proxyNodes
    sectionsOrder:
        - databaseVersion
        - resources
        - proxy
